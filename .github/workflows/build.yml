name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
    - name: Checkout code
      uses: actions/checkout@v4.2.2

    - name: Set up Python 3.10
      uses: actions/setup-python@v5.6.0
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip build-essential git \
          libssl-dev libffi-dev \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
          libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
          zlib1g-dev openjdk-17-jdk unzip wget autoconf libtool ccache

    - name: Accept Android SDK licenses
      run: |
        mkdir -p $HOME/.android
        touch $HOME/.android/repositories.cfg
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
          "build-tools;34.0.0" \
          "platforms;android-33" \
          "platform-tools" 2>/dev/null || true

    - name: Install buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0 cython==0.29.36

    - name: Cache buildozer
      uses: actions/cache@v4.2.3
      with:
        path: ~/.buildozer
        key: buildozer-${{ hashFiles('buildozer.spec') }}-v4
        restore-keys: |
          buildozer-

    - name: Build APK
      run: |
        yes | buildozer -v android debug 2>&1 | tee build.log
      env:
        BUILDOZER_WARN_ON_ROOT: 0

    - name: Show result
      if: always()
      run: |
        echo "=== APK files ==="
        find . -name "*.apk" 2>/dev/null || echo "No APK"
        echo "=== Last 50 lines ==="
        tail -50 build.log

    - name: Upload artifacts
      uses: actions/upload-artifact@v4.6.2
      if: always()
      with:
        name: island-adventures-apk
        path: |
          bin/*.apk
          build.log
        retention-days: 30
        if-no-files-found: warn
